<template>
  <lightning-card title="Grant Application">
    <div class="slds-p-around_medium">
      <template if:true={loading}>
        <lightning-spinner alternative-text="Submitting" size="medium">
        </lightning-spinner>
      </template>

      <lightning-input
        name="firstName"
        label="Applicant First Name"
        value={firstName}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-input
        class="slds-m-top_medium"
        name="lastName"
        label="Applicant Last Name"
        value={lastName}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-input
        class="slds-m-top_medium"
        name="phone"
        label="Phone"
        value={phone}
        pattern="^65 [0-9]{4} [0-9]{4}$"
        message-when-pattern-mismatch={phonePatternMessage}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-input
        class="slds-m-top_medium"
        name="email"
        type="email"
        label="Email"
        value={email}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-input
        class="slds-m-top_medium"
        name="mailingPostalCode"
        label="Mailing Postal Code"
        value={mailingPostalCode}
        pattern="^[0-9]{6}$"
        message-when-pattern-mismatch={postalCodePatternMessage}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-input
        class="slds-m-top_medium"
        name="monthlyIncome"
        type="number"
        label="Monthly Income"
        formatter="currency"
        step="1"
        min="0"
        value={monthlyIncome}
        required
        onchange={handleInputChange}
      >
      </lightning-input>

      <lightning-combobox
        class="slds-m-top_medium"
        name="supportOption"
        label="Support Option"
        value={supportOption}
        options={supportOptionOptions}
        required
        onchange={handleInputChange}
      >
      </lightning-combobox>

      <lightning-button
        class="slds-m-top_large"
        label="Submit"
        variant="brand"
        onclick={submitApplication}
      >
      </lightning-button>
    </div>
  </lightning-card>
</template>
